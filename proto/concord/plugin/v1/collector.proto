// Concord plugin protocol v1. Authoritative wire contract between the
// concord host and a Collector plugin binary.
syntax = "proto3";

package concord.plugin.v1;

option go_package = "github.com/concord-dev/concord/proto/concord/plugin/v1;pluginv1";

import "google/protobuf/struct.proto";

service Collector {
  rpc Capabilities(CapabilitiesRequest) returns (CapabilitiesResponse);
  rpc Probe(ProbeRequest) returns (ProbeResponse);
  rpc Collect(CollectRequest) returns (CollectResponse);
}

message CapabilitiesRequest {}

message CapabilitiesResponse {
  string concord_protocol_version = 1;
  string source = 2;
  string version = 3;
  string sdk_version = 4;
  repeated string supported_types = 5;
  repeated string required_env = 6;
  repeated string optional_env = 7;
  Permissions permissions = 8;
  string docs_url = 9;
}

message Permissions {
  repeated string network = 1;
  string filesystem = 2;
  bool subprocess = 3;
}

message ProbeRequest {
  int64 timeout_ms = 1;
}

message ProbeResponse {
  string info = 1;
}

message EvidenceRef {
  string id = 1;
  string source = 2;
  string type = 3;
  bool optional = 4;
  google.protobuf.Struct params = 5;
  string fixture = 6;
}

message CollectRequest {
  EvidenceRef ref = 1;
  string control_dir = 2;
  int64 timeout_ms = 3;
  string concord_run_id = 4;
}

message CollectResponse {
  oneof result {
    google.protobuf.Struct value = 1;
    bytes value_json = 2;
  }
  repeated string warnings = 3;
}
