// Concord plugin protocol v1 — Remediator service.
// A Remediator plugin executes a state-changing action against a vendor
// API to fix a failing finding. The host invokes it only after an
// operator explicitly opts in via `concord remediate <finding> --execute`.
syntax = "proto3";

package concord.plugin.v1;

option go_package = "github.com/concord-dev/concord/proto/concord/plugin/v1;pluginv1";

import "google/protobuf/struct.proto";
import "proto/concord/plugin/v1/collector.proto";

service Remediator {
  // Capabilities advertises the actions this remediator can perform.
  rpc Capabilities(CapabilitiesRequest) returns (RemediatorCapabilitiesResponse);

  // DryRun returns the operations the remediator would perform without
  // executing them. The host MUST show this to the operator before
  // calling Execute.
  rpc DryRun(RemediateRequest) returns (RemediateResponse);

  // Execute performs the remediation. Returns a structured audit trail
  // (resource ids touched, before/after state) the host writes to the
  // audit_event log.
  rpc Execute(RemediateRequest) returns (RemediateResponse);
}

message RemediatorCapabilitiesResponse {
  string concord_protocol_version = 1;
  string source = 2;
  string version = 3;
  // actions lists the operation ids this remediator implements
  // (e.g. "s3.enable_public_access_block", "iam.attach_mfa_policy").
  repeated string actions = 4;
  // required_env declares the credentials the host must inject before
  // calling Execute. Same shape as Collector.required_env.
  repeated string required_env = 5;
  Permissions permissions = 6;
}

message RemediateRequest {
  // finding_id is the persistent finding the operator is remediating.
  string finding_id = 1;
  // action is one of the ids returned by Capabilities.actions.
  string action = 2;
  // params carries action-specific arguments (e.g. bucket name, ARN).
  google.protobuf.Struct params = 3;
  // approval_token is a one-time token the host mints after the operator
  // confirms — implementations should reject calls without it during
  // Execute. DryRun ignores it.
  string approval_token = 4;
}

message RemediateResponse {
  // outcome is "executed", "would_execute" (DryRun), or "failed".
  string outcome = 1;
  // steps is the ordered list of resource-level operations the
  // remediator performed (or would perform).
  repeated RemediateStep steps = 2;
  // error_message is populated only when outcome=="failed".
  string error_message = 3;
}

message RemediateStep {
  // resource is the canonical identifier (ARN, full URL, etc.) the step
  // targets.
  string resource = 1;
  // operation is the action verb ("enable", "attach", "rotate").
  string operation = 2;
  // before captures the pre-change state for the audit log.
  google.protobuf.Struct before = 3;
  // after captures the post-change state.
  google.protobuf.Struct after = 4;
}
