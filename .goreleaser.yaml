version: 2

# NOTE: no `before.hooks: go mod tidy`. On a tag-triggered single-repo
# checkout the workspace go.work is absent, so `go mod tidy` cannot resolve
# the `replace github.com/concord-dev/concord-plugin-sdk => ../concord-plugin-sdk`
# sibling and fails the release. The module graph is already tidy in the
# committed go.mod/go.sum, so the hook is unnecessary. When the SDK is
# published as a tagged module (see assessment/30), drop the replace directive
# and this note becomes moot.

# Two binaries built from one repo (assessment/36 phase 3): the lean core
# `concord` for practitioners, and the `concord-admin` GRC bundle for compliance
# admins. Version metadata lives in internal/cli (both binaries share it), so the
# -X ldflags target that package, not main.
builds:
  - id: concord
    main: ./cmd/concord
    binary: concord
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/concord-dev/concord/internal/cli.version={{.Version}}
      - -X github.com/concord-dev/concord/internal/cli.commit={{.ShortCommit}}
      - -X github.com/concord-dev/concord/internal/cli.date={{.Date}}
  - id: concord-admin
    main: ./cmd/concord-admin
    binary: concord-admin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/concord-dev/concord/internal/cli.version={{.Version}}
      - -X github.com/concord-dev/concord/internal/cli.commit={{.ShortCommit}}
      - -X github.com/concord-dev/concord/internal/cli.date={{.Date}}

# Separate archives so each persona downloads only what they need.
archives:
  - id: concord
    ids: [concord]
    formats: [tar.gz]
    name_template: >-
      concord_{{ .Version }}_{{ .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
  - id: concord-admin
    ids: [concord-admin]
    formats: [tar.gz]
    name_template: >-
      concord-admin_{{ .Version }}_{{ .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"

release:
  github:
    owner: concord-dev
    name: concord
  draft: false
  prerelease: auto
  header: |
    ## Concord {{ .Tag }}

    Compliance-as-code release. Install:

    ```bash
    # macOS / Linux
    curl -sSfL https://github.com/concord-dev/concord/releases/download/{{ .Tag }}/concord_{{ .Version }}_$(uname -s | tr A-Z a-z)_$(uname -m).tar.gz | tar -xz
    sudo mv concord /usr/local/bin/
    concord version
    ```
  footer: |
    **Full Changelog**: https://github.com/concord-dev/concord/compare/{{ .PreviousTag }}...{{ .Tag }}
