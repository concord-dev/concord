paths:
  /operator/v1/orgs:
    post:
      summary: Create an organization
      operationId: operatorCreateOrg
      security: [{ operatorToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string }
                slug: { type: string }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '409':
          description: Slug already in use
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      summary: List every organization
      operationId: operatorListOrgs
      security: [{ operatorToken: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Organization' }

  /operator/v1/orgs/{slug}:
    get:
      summary: Fetch one organization
      operationId: operatorGetOrg
      security: [{ operatorToken: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '404': { $ref: '#/components/responses/NotFound' }

  /operator/v1/orgs/{slug}/tokens:
    get:
      summary: List API tokens for an org
      operationId: operatorListTokens
      security: [{ operatorToken: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/APIToken' }
    post:
      summary: Mint a new API token
      operationId: operatorCreateToken
      security: [{ operatorToken: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:             { type: string }
                created_by_email: { type: string, format: email }
      responses:
        '201':
          description: Token minted (plaintext returned ONCE)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/APITokenCreated' }

  /operator/v1/orgs/{slug}/tokens/{tokenID}:
    delete:
      summary: Revoke an API token
      operationId: operatorRevokeToken
      security: [{ operatorToken: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: tokenID
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Revoked }
        '404': { $ref: '#/components/responses/NotFound' }

  /operator/v1/orgs/{slug}/members:
    get:
      summary: List members of an org with their roles
      operationId: operatorListMembers
      security: [{ operatorToken: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OrgMember' }
    post:
      summary: Attach a user to an org with one or more roles
      operationId: operatorAddMember
      security: [{ operatorToken: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roles]
              properties:
                user_id: { type: string, format: uuid }
                email:   { type: string, format: email }
                roles:
                  type: array
                  items: { type: string, enum: [owner, admin, member, viewer] }
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:  { $ref: '#/components/schemas/User' }
                  org:   { $ref: '#/components/schemas/Organization' }
                  roles: { type: array, items: { type: string } }

  /operator/v1/orgs/{slug}/members/{userID}:
    delete:
      summary: Remove a user from the org (drops every role grant)
      operationId: operatorRemoveMember
      security: [{ operatorToken: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: userID
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Removed }
        '404': { $ref: '#/components/responses/NotFound' }

  /operator/v1/users:
    get:
      summary: List every user
      operationId: operatorListUsers
      security: [{ operatorToken: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
    post:
      summary: Create a user
      operationId: operatorCreateUser
      security: [{ operatorToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email]
              properties:
                first_name: { type: string }
                last_name:  { type: string }
                email:      { type: string, format: email }
                password:
                  type: string
                  format: password
                  description: |
                    Optional. When empty the user cannot log in until a
                    later password-set flow assigns one.
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /operator/v1/roles:
    get:
      summary: List canonical roles with their permission bundles
      operationId: operatorListRoles
      security: [{ operatorToken: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RoleWithPermissions' }

  /operator/v1/permissions:
    get:
      summary: List every defined permission
      operationId: operatorListPermissions
      security: [{ operatorToken: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Permission' }

  /operator/v1/auditors:
    get:
      summary: List users with cross-org read access (auditors)
      description: |
        Auditors are users with the `is_auditor` flag set — they have
        read-only access to every organization, regardless of
        membership. The flag is operator-managed; org admins cannot
        grant it. Review this list periodically as part of an access
        review (SOC 2 CC6.1).
      operationId: operatorListAuditors
      security: [{ operatorToken: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
    post:
      summary: Grant cross-org read access (auditor flag)
      description: |
        Sets `is_auditor = true` for the named user. Idempotent. The
        target may be specified by user_id OR email. Subsequent
        `*:read` permission checks on any org will succeed for this
        user without per-org role membership. Write permissions are
        NOT affected by the flag.
      operationId: operatorGrantAuditor
      security: [{ operatorToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string, format: uuid }
                email:   { type: string, format: email }
      responses:
        '200':
          description: User updated; response carries the user row with is_auditor=true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Revoke cross-org read access (auditor flag)
      description: |
        Sets `is_auditor = false`. Idempotent. Active sessions for the
        user are NOT invalidated automatically — operate separately if a
        hard cutoff is required.
      operationId: operatorRevokeAuditor
      security: [{ operatorToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string, format: uuid }
                email:   { type: string, format: email }
      responses:
        '204': { description: Revoked }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─── Dead-letter queue (Phase 4) ───────────────────────────────────
  /operator/v1/dlq/events:
    get:
      summary: List dead event_outbox rows
      description: |
        Returns event_outbox rows whose attempt_count has reached the
        dispatcher's max-attempts ceiling — the producer-side dead-letter
        cohort. Pagination via `limit` (1..500, default 50) and `offset`.
        Optional `org_id` and `kind` filters.
      operationId: operatorListDLQEvents
      security: [{ operatorToken: [] }]
      parameters:
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 500 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
        - { name: org_id, in: query, schema: { type: string, format: uuid } }
        - { name: kind,   in: query, schema: { type: string } }
      responses:
        '200':
          description: Dead event_outbox rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  events: { type: array, items: { type: object } }
                  limit:  { type: integer }
                  offset: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
  /operator/v1/dlq/events/{id}:
    get:
      summary: Fetch one dead event_outbox row
      operationId: operatorGetDLQEvent
      security: [{ operatorToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Full row including payload, last_error, attempt history
          content:
            application/json:
              schema: { type: object }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Abandon a dead event (reversible)
      description: |
        Stamps `abandoned_at`. The dispatcher's claim query skips
        abandoned rows. Forensic columns (payload, last_error) stay
        intact. Reversible — `POST .../replay` clears the abandon flag.
      operationId: operatorAbandonDLQEvent
      security: [{ operatorToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Abandoned }
        '404': { $ref: '#/components/responses/NotFound' }
  /operator/v1/dlq/events/{id}/replay:
    post:
      summary: Replay a dead event
      description: |
        Resets `attempt_count = 0`, `last_error = NULL`,
        `next_attempt_at = now()`, and clears `abandoned_at`. The
        dispatcher picks the row up on its next tick.
      operationId: operatorReplayDLQEvent
      security: [{ operatorToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Replay scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:       { type: string, format: uuid }
                  replayed: { type: boolean }
        '404': { $ref: '#/components/responses/NotFound' }

  /operator/v1/dlq/deliveries:
    get:
      summary: List dead webhook_delivery rows
      description: |
        Returns webhook_delivery rows in status='dead' — the
        consumer-side dead-letter cohort. Same pagination + filters as
        /operator/v1/dlq/events.
      operationId: operatorListDLQDeliveries
      security: [{ operatorToken: [] }]
      parameters:
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 500 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
        - { name: org_id, in: query, schema: { type: string, format: uuid } }
        - { name: kind,   in: query, schema: { type: string } }
      responses:
        '200':
          description: Dead webhook_delivery rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries: { type: array, items: { type: object } }
                  limit:      { type: integer }
                  offset:     { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
  /operator/v1/dlq/deliveries/{id}:
    get:
      summary: Fetch one dead webhook delivery
      operationId: operatorGetDLQDelivery
      security: [{ operatorToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Full row including attempts_log
          content:
            application/json:
              schema: { type: object }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Abandon a dead delivery (reversible)
      operationId: operatorAbandonDLQDelivery
      security: [{ operatorToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Abandoned }
        '404': { $ref: '#/components/responses/NotFound' }
  /operator/v1/dlq/deliveries/{id}/replay:
    post:
      summary: Replay a dead webhook delivery
      description: |
        Transitions the row from 'dead' back to 'failed' with
        `attempt_count = 0` and `next_attempt_at = now()`. The retrier
        picks it up on its next tick.
      operationId: operatorReplayDLQDelivery
      security: [{ operatorToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Replay scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:       { type: string, format: uuid }
                  replayed: { type: boolean }
        '404': { $ref: '#/components/responses/NotFound' }

# Default security: every operation falls back to bearerAuth unless its own
# `security:` overrides. Public endpoints declare `security: []`.
