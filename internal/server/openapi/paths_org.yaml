paths:
  /v1/orgs/{slug}/me:
    get:
      summary: Resolved org + permissions for the current caller
      operationId: getOrgMe
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgMe' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/frameworks:
    get:
      summary: Frameworks present in the control library, with counts
      operationId: listFrameworks
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FrameworkCount' }

  /v1/orgs/{slug}/controls:
    get:
      summary: List controls (optionally filtered by framework)
      operationId: listControls
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: framework
          in: query
          schema: { type: string }
          description: e.g. `nist-800-53`
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Control' }

  /v1/orgs/{slug}/controls/{id}:
    get:
      summary: Fetch one control by id (case-insensitive)
      operationId: getControl
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Control' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/findings:
    get:
      summary: Most recent succeeded run's findings (convenience shortcut)
      operationId: getLatestFindings
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/runs:
    get:
      summary: Run history (most recent 50)
      operationId: listRuns
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RunListEntry' }
    post:
      summary: Submit a completed run from an agent
      description: |
        The agent-push entry point. Customers run the OSS `concord` CLI on
        their own infrastructure with their own credentials and POST the
        completed findings here. Credentials for the underlying providers
        (AWS, GitHub, etc.) never reach Concord.

        Authentication is the standard API token — there is no separate
        signing key.
      operationId: submitRun
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentSubmission' }
      responses:
        '201':
          description: Run accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentSubmissionResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '413': { description: Submission body exceeds the 25 MB limit }

  /v1/orgs/{slug}/runs/{id}:
    get:
      summary: Single run, including summary + findings when complete
      operationId: getRun
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/events:
    get:
      summary: Server-Sent Events stream of run lifecycle events
      description: |
        Long-poll over `text/event-stream`. Frames are formatted as:

        ```
        event: run.completed
        data: {"kind":"run.completed","org_id":"...","run_id":"...","summary":{...}}
        ```

        Heartbeats fire every 15s as `: heartbeat` comments.
      operationId: streamEvents
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }

  /v1/orgs/{slug}/overrides:
    get:
      summary: List every control override the org has on file
      operationId: listOverrides
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ControlOverride' }

  /v1/orgs/{slug}/controls/{id}/overrides:
    get:
      summary: Read the override for one control
      operationId: getOverride
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlOverride' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      summary: Upsert the override for one control
      operationId: putOverride
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [params]
              properties:
                params:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Override upserted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlOverride' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Remove the override for one control
      operationId: deleteOverride
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Override deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/webhooks:
    get:
      summary: List the org's webhooks
      operationId: listWebhooks
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Webhook' }
    post:
      summary: Create a webhook
      description: |
        Returns the new webhook AND its HMAC secret. Save the secret — it is
        never exposed again. Outbound deliveries sign their JSON body with
        HMAC-SHA256 and pass the signature in `X-Concord-Signature`.
      operationId: createWebhook
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:         { type: string, format: uri }
                event_kinds:
                  type: array
                  items: { type: string }
                enabled:     { type: boolean, default: true }
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookCreated' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /v1/orgs/{slug}/webhooks/{id}:
    get:
      summary: Fetch one webhook (secret never returned)
      operationId: getWebhook
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - { $ref: '#/components/parameters/UUIDPath' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Webhook' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      summary: Patch a webhook (URL, event_kinds, enabled)
      operationId: updateWebhook
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - { $ref: '#/components/parameters/UUIDPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:         { type: string, format: uri }
                event_kinds:
                  type: array
                  items: { type: string }
                enabled:     { type: boolean }
      responses:
        '200':
          description: Webhook updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Webhook' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Delete a webhook
      operationId: deleteWebhook
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - { $ref: '#/components/parameters/UUIDPath' }
      responses:
        '204': { description: Webhook deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/invitations:
    get:
      summary: List pending invitations for the org
      operationId: listInvitations
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Invitation' }
    post:
      summary: Mint a pending invitation for (email, role)
      description: |
        Returns the persisted invitation AND the plaintext accept token. The
        token is shown ONCE — if lost, revoke the invitation and re-invite.
        Any prior pending invitation for the same email is silently revoked
        and superseded.
      operationId: createInvitation
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role:  { type: string, description: "Role name, e.g. owner|admin|member|viewer" }
                ttl:   { type: string, description: "Optional Go duration string (default 168h = 7d)" }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationCreated' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /v1/orgs/{slug}/invitations/{id}:
    delete:
      summary: Revoke (soft-delete) a pending invitation
      operationId: revokeInvitation
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - { $ref: '#/components/parameters/UUIDPath' }
      responses:
        '204': { description: Revoked }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/trust-portal/settings:
    get:
      summary: Read trust-portal opt-in state + public URL
      operationId: getTrustPortalSettings
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: Current settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrustPortalSettings' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      summary: Toggle the public trust portal on or off
      description: |
        Requires `trust_portal:manage` (owner + admin roles by default).
        Off by default — flip on only after confirming the org's findings
        contain nothing the tenant would not publish.
      operationId: putTrustPortalSettings
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrustPortalSettings' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/orgs/{slug}/audit:
    get:
      summary: List audit-log events for the org
      description: |
        Returns audit events for the named org, newest first. Requires the
        `audit:read` permission (granted to owner + admin roles by default).
        Filters compose: pass any combination of `since`, `until`, and
        `action` to narrow the result. `limit` defaults to 50 and is
        capped at 500 server-side so a hostile caller can't drive a
        million-row scan.
      operationId: listAuditEvents
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: until
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: action
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:             { type: string, format: uuid }
                    occurred_at:    { type: string, format: date-time }
                    actor_kind:     { type: string, enum: [user, token, operator, unauthenticated, system] }
                    actor_user_id:  { type: string, format: uuid }
                    actor_token_id: { type: string, format: uuid }
                    org_id:         { type: string, format: uuid }
                    action:         { type: string }
                    target_type:    { type: string }
                    target_id:      { type: string, format: uuid }
                    ip:             { type: string }
                    user_agent:     { type: string }
                    request_id:     { type: string }
                    details:        { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ─── Operator (CONCORD_OPERATOR_TOKEN) ─────────────────────────────────

