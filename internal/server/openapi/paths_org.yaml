paths:
  /v1/orgs/{slug}/me:
    get:
      summary: Resolved org + permissions for the current caller
      operationId: getOrgMe
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgMe' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/frameworks:
    get:
      summary: Frameworks present in the control library, with counts
      operationId: listFrameworks
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FrameworkCount' }

  /v1/orgs/{slug}/controls:
    get:
      summary: List controls (optionally filtered by framework)
      operationId: listControls
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: framework
          in: query
          schema: { type: string }
          description: e.g. `nist-800-53`
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Control' }

  /v1/orgs/{slug}/controls/{id}:
    get:
      summary: Fetch one control by id (case-insensitive)
      operationId: getControl
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Control' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/check:
    post:
      summary: Enqueue a compliance run for the org
      description: |
        Returns `202 Accepted` immediately with a `run_id` and a `poll_url`.
        The worker pool runs the checks asynchronously; subscribe to
        `/v1/orgs/{slug}/events` or poll `/v1/orgs/{slug}/runs/{id}` for the
        terminal outcome.
      operationId: createRun
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '202':
          description: Run enqueued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunAccepted' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503':
          description: Worker queue full
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/orgs/{slug}/findings:
    get:
      summary: Most recent succeeded run's findings (convenience shortcut)
      operationId: getLatestFindings
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/runs:
    get:
      summary: Run history (most recent 50)
      operationId: listRuns
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RunListEntry' }
    post:
      summary: Submit a completed run from an agent
      description: |
        The agent-push entry point. Customers run the OSS collector on their
        own infrastructure and POST the completed findings here. Credentials
        for the underlying providers (AWS, GitHub, etc.) never reach Concord.

        Authenticate with the standard API token. Optionally sign the raw
        request body with an Ed25519 key registered via
        `POST /v1/orgs/{slug}/agent-keys` and pass:

          X-Concord-Agent-Key-Id: <uuid>
          X-Concord-Agent-Signature: <base64 standard, 64 bytes raw>

        Either both signature headers are present or both absent — sending
        only one is rejected so an attacker can't quietly downgrade a signed
        push to an unsigned one. Unsigned pushes are accepted (API token
        auth alone is sufficient) but the resulting run is marked
        `source: unsigned` for operator visibility.
      operationId: submitRun
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentSubmission' }
      responses:
        '201':
          description: Run accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentSubmissionResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Signature verification failed, or only one signature header was set
        '413': { description: Submission body exceeds the 25 MB limit }

  /v1/orgs/{slug}/runs/{id}:
    get:
      summary: Single run, including summary + findings when complete
      operationId: getRun
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/events:
    get:
      summary: Server-Sent Events stream of run lifecycle events
      description: |
        Long-poll over `text/event-stream`. Frames are formatted as:

        ```
        event: run.completed
        data: {"kind":"run.completed","org_id":"...","run_id":"...","summary":{...}}
        ```

        Heartbeats fire every 15s as `: heartbeat` comments.
      operationId: streamEvents
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }

  /v1/orgs/{slug}/overrides:
    get:
      summary: List every control override the org has on file
      operationId: listOverrides
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ControlOverride' }

  /v1/orgs/{slug}/controls/{id}/overrides:
    get:
      summary: Read the override for one control
      operationId: getOverride
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlOverride' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      summary: Upsert the override for one control
      operationId: putOverride
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [params]
              properties:
                params:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Override upserted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlOverride' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Remove the override for one control
      operationId: deleteOverride
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Override deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/schedule:
    get:
      summary: Read the org's cron-driven schedule
      operationId: getSchedule
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Schedule' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      summary: Install or replace the org's schedule
      operationId: putSchedule
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cron_expr]
              properties:
                cron_expr: { type: string }
                enabled:   { type: boolean, default: true }
      responses:
        '200':
          description: Schedule upserted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Schedule' }
        '400': { $ref: '#/components/responses/BadRequest' }
    delete:
      summary: Remove the org's schedule
      operationId: deleteSchedule
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '204': { description: Schedule deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/webhooks:
    get:
      summary: List the org's webhooks
      operationId: listWebhooks
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Webhook' }
    post:
      summary: Create a webhook
      description: |
        Returns the new webhook AND its HMAC secret. Save the secret — it is
        never exposed again. Outbound deliveries sign their JSON body with
        HMAC-SHA256 and pass the signature in `X-Concord-Signature`.
      operationId: createWebhook
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:         { type: string, format: uri }
                event_kinds:
                  type: array
                  items: { type: string }
                enabled:     { type: boolean, default: true }
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookCreated' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /v1/orgs/{slug}/webhooks/{id}:
    get:
      summary: Fetch one webhook (secret never returned)
      operationId: getWebhook
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - { $ref: '#/components/parameters/UUIDPath' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Webhook' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      summary: Patch a webhook (URL, event_kinds, enabled)
      operationId: updateWebhook
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - { $ref: '#/components/parameters/UUIDPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:         { type: string, format: uri }
                event_kinds:
                  type: array
                  items: { type: string }
                enabled:     { type: boolean }
      responses:
        '200':
          description: Webhook updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Webhook' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Delete a webhook
      operationId: deleteWebhook
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - { $ref: '#/components/parameters/UUIDPath' }
      responses:
        '204': { description: Webhook deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/agent-keys:
    get:
      summary: List active (non-revoked) agent signing keys for the org
      operationId: listAgentKeys
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AgentKey' }
    post:
      summary: Register an Ed25519 public key for agent signing
      description: |
        Each key gets a friendly `name` unique within the org (revoked keys
        keep their name so audit history stays readable). The 32-byte Ed25519
        public key is supplied as standard base64. Requires
        `agent_keys:manage` (owner + admin by default).
      operationId: createAgentKey
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, public_key]
              properties:
                name:        { type: string }
                public_key:  { type: string, description: "Ed25519 public key, base64 (32 raw bytes)" }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentKey' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { description: A key with this name already exists in this org }

  /v1/orgs/{slug}/agent-keys/{id}:
    delete:
      summary: Revoke (soft-delete) an agent signing key
      operationId: revokeAgentKey
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
        - { $ref: '#/components/parameters/UUIDPath' }
      responses:
        '204': { description: Revoked }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/orgs/{slug}/trust-portal/settings:
    get:
      summary: Read trust-portal opt-in state + public URL
      operationId: getTrustPortalSettings
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      responses:
        '200':
          description: Current settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrustPortalSettings' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      summary: Toggle the public trust portal on or off
      description: |
        Requires `trust_portal:manage` (owner + admin roles by default).
        Off by default — flip on only after confirming the org's findings
        contain nothing the tenant would not publish.
      operationId: putTrustPortalSettings
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrgSlug' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrustPortalSettings' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ─── Operator (CONCORD_OPERATOR_TOKEN) ─────────────────────────────────

