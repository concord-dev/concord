paths:
  /healthz:
    get:
      summary: Liveness probe (process is up)
      description: |
        Always returns 200 as long as the HTTP server is accepting connections.
        Never touches downstream dependencies — restarting the process can't
        repair a downed database, so a livenessProbe wired here is a
        crash-loop hazard. Use `/readyz` for dep-aware checks.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }

  /readyz:
    get:
      summary: Readiness probe (deps are reachable)
      description: |
        Probes every external dependency the server needs to serve requests
        (today: Postgres). Returns 200 when all are reachable, 503 when one
        or more are failing — with a per-dep breakdown so an operator can
        see which subsystem is down. Load balancers should drain a pod while
        this endpoint is 503ing.
      operationId: getReady
      security: []
      responses:
        '200':
          description: All dependencies reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok] }
                  checks:
                    type: object
                    additionalProperties: { type: string }
        '503':
          description: One or more dependencies are unreachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [degraded] }
                  checks:
                    type: object
                    additionalProperties: { type: string }

  /metrics:
    get:
      summary: Prometheus exposition (text format)
      description: |
        Prometheus-format metrics for scraping. Exposes:
        `concord_http_requests_total`, `concord_http_request_duration_seconds`,
        `concord_http_inflight_requests`, `concord_webhook_deliveries_total`,
        `concord_bus_events_dropped_total`, `concord_db_pool_*`, plus the
        standard Go runtime and process collectors. Unauthenticated by
        design — operators are expected to restrict access at ingress.
      operationId: getMetrics
      security: []
      responses:
        '200':
          description: Metrics text body
          content:
            text/plain:
              schema: { type: string }

  /version:
    get:
      summary: Build metadata + control library size
      operationId: getVersion
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:  { type: string }
                  controls: { type: integer }

  /v1/orgs/{slug}/trust-portal:
    get:
      summary: Public compliance snapshot (HTML)
      description: |
        Renders the org's most recent succeeded run as a self-contained HTML
        trust portal. Opt-in per org — disabled by default. When disabled (or
        when the org doesn't exist, or when no run has succeeded yet) the
        endpoint returns 404 with no body. The 404 is deliberately identical
        across all "not available" cases so the route can't be used to
        enumerate slugs.
      operationId: getTrustPortal
      security: []
      parameters:
        - $ref: '#/components/parameters/OrgSlug'
      responses:
        '200':
          description: Trust portal HTML
          content:
            text/html:
              schema: { type: string }
        '404':
          description: Org not found, portal disabled, or no successful run yet

  /v1/invitations/accept:
    get:
      summary: Preview an invitation (public — no auth needed)
      description: |
        Resolves an invitation token to the org name + role + email it was
        issued for, plus a `needs_account` hint so the frontend can decide
        whether to show a "create account" form or a "you already have an
        account" message.
      operationId: previewInvitation
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Preview
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationPreview' }
        '404': { description: Token unknown, accepted, or revoked }
        '410': { description: Token expired — request a fresh invitation }
    post:
      summary: Accept an invitation
      description: |
        Completes the invitation flow: optionally creates the user account
        (when `needs_account` was true in the preview) and attaches them to
        the inviting org with the invited role. Issues a session token so
        the caller is logged in immediately.

        For existing accounts the `first_name` / `last_name` / `password`
        fields are ignored — the existing credentials stay in force.
      operationId: acceptInvitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvitationAcceptRequest' }
      responses:
        '200':
          description: Accepted; session attached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationAcceptResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { description: Token unknown, accepted, or revoked }
        '410': { description: Token expired }

  # ─── Auth ──────────────────────────────────────────────────────────────

  /v1/auth/login:
    post:
      summary: Exchange email + password for a session token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/auth/login/mfa:
    post:
      summary: Second-leg login completion (TOTP or recovery code)
      description: |
        When the user has MFA enrolled, `/v1/auth/login` returns an
        `mfa_token` instead of a session. POST that token + one of
        `code` (6-digit TOTP) or `recovery_code` (XXXX-XXXX one-time
        code) here to complete sign-in. On success the response is a
        fully-formed Session, identical to the single-factor login path.
      operationId: loginMFA
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfa_token]
              properties:
                mfa_token:     { type: string }
                code:          { type: string, description: "6-digit TOTP code" }
                recovery_code: { type: string, description: "One-time recovery code (XXXX-XXXX)" }
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '410': { description: MFA token expired }
        '429': { description: Rate limited }

  /v1/auth/logout:
    post:
      summary: Revoke the current session
      operationId: logout
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Session revoked }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/auth/password-reset:
    post:
      summary: Request a password reset link
      description: |
        Always returns `200` regardless of whether the email is on file —
        prevents user-enumeration via response status. When the email
        matches an account, a single-use token is minted and delivered
        out-of-band (server logs today; email when that lands).
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Always 200 (acknowledgement only — no enumeration leak)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok] }
                  note:   { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }

  /v1/auth/password-reset/confirm:
    post:
      summary: Confirm a password reset
      description: |
        Validates the reset token and atomically: updates the user's
        password, marks the token used, revokes every active session for
        the user, then mints a fresh session so the caller is logged in
        immediately. API tokens are left alone.
      operationId: confirmPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:        { type: string }
                new_password: { type: string, format: password }
      responses:
        '200':
          description: Reset accepted; new session attached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { description: Token unknown or already consumed }
        '410': { description: Token expired — request a fresh reset }

  # ─── Session-scoped (user lives across multiple orgs) ──────────────────

  /v1/me:
    get:
      summary: Currently authenticated user
      operationId: getMe
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/me/orgs:
    get:
      summary: Orgs the current user belongs to, with their roles in each
      operationId: listMyOrgs
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserOrg' }

  /v1/me/mfa:
    get:
      summary: MFA enrollment status for the current user
      operationId: getMFAStatus
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrolled:                  { type: boolean }
                  recovery_codes_remaining:  { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/me/mfa/totp/enroll:
    post:
      summary: Start TOTP enrollment
      description: |
        Generates a fresh TOTP secret and returns a provisioning URI
        ready to be rendered as a QR code. The next step is
        `/v1/me/mfa/totp/verify` with a 6-digit code from the user's
        authenticator app. Subsequent calls before verification
        overwrite the pending secret; calls after verification return
        409 — disable MFA first if you want to re-enroll.
      operationId: enrollTOTP
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Pending enrollment
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:           { type: string }
                  provisioning_uri: { type: string }
                  issuer:           { type: string }
                  account_name:     { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: Already enrolled }

  /v1/me/mfa/totp/verify:
    post:
      summary: Verify TOTP and complete enrollment
      description: |
        Validates the first 6-digit code typed from the authenticator app
        and, on success, finalizes enrollment + generates 10 one-time
        recovery codes (returned ONCE in the response body).
      operationId: verifyTOTP
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, description: "6-digit TOTP code" }
      responses:
        '200':
          description: Enrolled
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrolled:        { type: boolean }
                  recovery_codes:
                    type: array
                    items: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: Already enrolled }

  /v1/me/mfa/disable:
    post:
      summary: Disable MFA — REQUIRES current password
      description: |
        Wipes the user's TOTP secret and every recovery code. Gated on
        the user's current password so a stolen session can't strip the
        second factor on its own.
      operationId: disableMFA
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, format: password }
      responses:
        '204': { description: MFA disabled }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/me/mfa/recovery-codes/regenerate:
    post:
      summary: Rotate recovery codes — REQUIRES current password
      operationId: regenerateRecoveryCodes
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, format: password }
      responses:
        '200':
          description: Fresh batch
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_codes:
                    type: array
                    items: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─── Org API ───────────────────────────────────────────────────────────

