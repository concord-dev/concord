services:
  postgres:
    image: postgres:16-alpine
    container_name: concord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: concord
      POSTGRES_USER: concord
      POSTGRES_PASSWORD: concord-dev
    ports:
      - "5432:5432"
    volumes:
      - concord-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concord -d concord"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: concord-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    profiles: ["server"]
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: concord-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://concord:concord-dev@postgres:5432/concord?sslmode=disable
      LISTEN_ADDR: ":8080"
      CONCORD_RATE_LIMITER: "redis"
      CONCORD_REDIS_ADDR: "redis:6379"
    ports:
      - "8080:8080"

volumes:
  concord-pgdata:
