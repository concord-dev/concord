services:
  postgres:
    image: postgres:16-alpine
    container_name: concord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: concord
      POSTGRES_USER: concord
      POSTGRES_PASSWORD: concord-dev
    ports:
      - "5432:5432"
    volumes:
      - concord-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concord -d concord"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: concord-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redpanda is a Kafka-API-compatible broker in a single binary — starts
  # in ~5s, no Zookeeper / KRaft ceremony. Production runs against real
  # Kafka; local dev uses this so the producer codepath is identical.
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.13
    container_name: concord-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://127.0.0.1:19092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
    ports:
      - "19092:19092"   # external Kafka API (used by host-running tests / dev server)
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X brokers=127.0.0.1:9092 | grep -q 'Healthy: *true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    profiles: ["server"]
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: concord-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://concord:concord-dev@postgres:5432/concord?sslmode=disable
      LISTEN_ADDR: ":8080"
      CONCORD_RATE_LIMITER: "redis"
      CONCORD_REDIS_ADDR: "redis:6379"
      CONCORD_KAFKA_BROKERS: "redpanda:9092"
      CONCORD_KAFKA_TOPIC: "concord.events"
    ports:
      - "8080:8080"

  worker:
    profiles: ["server"]
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: concord-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: ["/usr/local/bin/concord-worker", "serve"]
    environment:
      DATABASE_URL: postgres://concord:concord-dev@postgres:5432/concord?sslmode=disable
      LISTEN_ADDR: ":9090"
      CONCORD_KAFKA_BROKERS: "redpanda:9092"
      CONCORD_KAFKA_TOPIC: "concord.events"
      CONCORD_KAFKA_GROUP: "concord-worker"
      CONCORD_DEDUPE_REDIS: "redis"
      CONCORD_DEDUPE_REDIS_ADDR: "redis:6379"
    ports:
      - "9090:9090"

volumes:
  concord-pgdata:
