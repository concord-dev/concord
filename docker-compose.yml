services:
  postgres:
    image: postgres:16-alpine
    container_name: concord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: concord
      POSTGRES_USER: concord
      POSTGRES_PASSWORD: concord-dev
    ports:
      - "5432:5432"
    volumes:
      - concord-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concord -d concord"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    profiles: ["server"]
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: concord-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://concord:concord-dev@postgres:5432/concord?sslmode=disable
      LISTEN_ADDR: ":8080"
    ports:
      - "8080:8080"

volumes:
  concord-pgdata:
