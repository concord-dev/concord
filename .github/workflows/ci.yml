name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -buildvcs=false -race ./...

      - name: Build
        run: go build -buildvcs=false -o /tmp/concord ./cmd/concord

      - name: Self-check (smoke test)
        run: /tmp/concord check --fixtures --quiet --controls ./controls
