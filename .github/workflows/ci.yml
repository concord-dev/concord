name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch — a force-push during CI
# shouldn't burn two parallel test runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for the toolchain. Keep in lockstep with go.mod
  # and .github/workflows/release.yml.
  GO_VERSION: '1.25.11'

# This repo builds ONLY the `concord` CLI + engine (and the concord-admin
# bundle). The server, worker, Helm chart, and Kafka-backed tests live in
# concord-dev/concord-platform and are CI'd there. The plugin SDK is consumed
# as a published module (github.com/concord-dev/concord-plugin-sdk), so a clean
# single-repo checkout builds — no sibling checkout, no replace directive. The
# committed go.work is for local multi-repo dev only and is absent here.

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: install analyzers
        run: make tools

      - name: staticcheck
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          staticcheck ./...

      - name: deadcode
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          deadcode -test ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::these files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  vuln:
    name: vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: govulncheck
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          govulncheck ./...

  test:
    name: test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      # The CLI engine needs no backends. Integration-tagged tests spawn real
      # plugins / hit ghcr and are exercised via `make test-integration`
      # (kept out of the default PR gate because they need network + binaries).
      - name: test (race + count=1)
        run: go test -buildvcs=false -race -count=1 ./...

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: build binaries
        run: |
          go build -buildvcs=false -o /tmp/concord ./cmd/concord
          go build -buildvcs=false -o /tmp/concord-admin ./cmd/concord-admin

      - name: smoke (check engine evaluates a control)
        run: /tmp/concord check --fixtures --quiet --controls testdata/smoke-pack
