{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "concord.serviceAccountName" . }}
  labels:
    {{- include "concord.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# concord-server doesn't talk to the K8s API directly — there's no use
# for the bound token. Disable automatic mounting so a compromised pod
# can't reach the kube-apiserver from this principal.
automountServiceAccountToken: false
{{- end -}}
