{{- if gt (int .Values.replicaCount) 1 -}}
# PDB exists so node drains / cluster upgrades can never take down the
# whole concord-server fleet at once. Tied to a hard minAvailable of 1
# (not a percentage) so even a 2-replica deploy can lose exactly one
# Pod during a drain. Bump when replicaCount is large enough that
# losing 50% is acceptable.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "concord.fullname" . }}
  labels:
    {{- include "concord.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "concord.selectorLabels" . | nindent 6 }}
{{- end -}}
