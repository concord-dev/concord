{{- if not .Values.database.databaseUrlSecret.name -}}
{{- fail "database.databaseUrlSecret.name is required — set it to a Secret holding the Postgres DSN at database.databaseUrlSecret.key (default DATABASE_URL)" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "concord.fullname" . }}
  labels:
    {{- include "concord.labels" . | nindent 4 }}
spec:
  # HPA owns replicas when autoscaling is on; leaving `replicas` unset
  # so a `helm upgrade` after HPA scaled up doesn't reset the count.
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "concord.selectorLabels" . | nindent 6 }}
  # RollingUpdate with maxUnavailable: 0 keeps a strict zero-downtime
  # guarantee during a deploy — the new Pod must pass readiness before
  # the old one terminates. Lines up with the graceful-shutdown drain
  # baked into concord-server.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "concord.selectorLabels" . | nindent 8 }}
      annotations:
        # Trigger a rolling restart when the rendered config changes.
        # A SHA of the values block ensures a `helm upgrade --set X`
        # actually re-rolls the Pods even when only env-vars changed.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.metrics.podAnnotations }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.port | quote }}
        prometheus.io/path: /metrics
        {{- end }}
    spec:
      serviceAccountName: {{ include "concord.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: concord-server
          image: {{ include "concord.imageRef" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "concord.fullname" . }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.databaseUrlSecret.name }}
                  key: {{ .Values.database.databaseUrlSecret.key }}
            {{- if .Values.config.operatorTokenSecretName }}
            - name: CONCORD_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.operatorTokenSecretName }}
                  key: {{ .Values.config.operatorTokenSecretKey }}
            {{- end }}
            {{- if and .Values.smtp.credentialsSecretName .Values.smtp.credentialsSecretUsernameKey }}
            - name: CONCORD_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.credentialsSecretName }}
                  key: {{ .Values.smtp.credentialsSecretUsernameKey }}
            {{- end }}
            {{- if and .Values.smtp.credentialsSecretName .Values.smtp.credentialsSecretPasswordKey }}
            - name: CONCORD_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.credentialsSecretName }}
                  key: {{ .Values.smtp.credentialsSecretPasswordKey }}
            {{- end }}
            {{- if and (eq .Values.redis.rateLimiter "redis") .Values.redis.credentialsSecretName .Values.redis.credentialsSecretUsernameKey }}
            - name: CONCORD_REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.credentialsSecretName }}
                  key: {{ .Values.redis.credentialsSecretUsernameKey }}
            {{- end }}
            {{- if and (eq .Values.redis.rateLimiter "redis") .Values.redis.credentialsSecretName .Values.redis.credentialsSecretPasswordKey }}
            - name: CONCORD_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.credentialsSecretName }}
                  key: {{ .Values.redis.credentialsSecretPasswordKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Liveness: process is up. Never touches downstream deps.
          # If this fails the kubelet restarts the Pod — a healthy
          # restart loop is preferable to a wedged process.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          # Readiness: deps reachable. Failure removes the Pod from
          # the Service endpoints but does NOT restart it — that's the
          # whole point of the /readyz vs /healthz split inside the API.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # tmpfs for /tmp so readOnlyRootFilesystem doesn't break
            # anything that wants to create a temp file (zip building
            # uses an in-memory writer today, but defensive).
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
