apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "concord.fullname" . }}
  labels:
    {{- include "concord.labels" . | nindent 4 }}
data:
  # Boring, non-secret tuning lives here so a `kubectl rollout restart`
  # is the only ceremony for changing it (vs. baking into the Pod spec
  # which forces a full Deployment edit). Secrets (DATABASE_URL,
  # operator token, SMTP creds) stay in real Secrets — never here.
  LISTEN_ADDR: {{ .Values.config.listenAddr | quote }}
  CONCORD_LOG_FORMAT: {{ .Values.config.log.format | quote }}
  CONCORD_LOG_LEVEL: {{ .Values.config.log.level | quote }}
  CONCORD_SHUTDOWN_TIMEOUT: {{ .Values.config.shutdownTimeout | quote }}
  {{- with .Values.config.corsAllowedOrigins }}
  CONCORD_CORS_ALLOWED_ORIGINS: {{ join "," . | quote }}
  {{- end }}
  {{- if eq .Values.redis.rateLimiter "redis" }}
  # Shared Redis-backed rate limiter. The server fails fast at startup
  # if Redis is unreachable, so make sure the Pod can reach it before
  # rollout (NetworkPolicy + DNS + auth).
  CONCORD_RATE_LIMITER: "redis"
  {{- if .Values.redis.mode }}
  CONCORD_REDIS_MODE: {{ .Values.redis.mode | quote }}
  {{- end }}
  {{- if .Values.redis.addr }}
  CONCORD_REDIS_ADDR: {{ .Values.redis.addr | quote }}
  {{- end }}
  {{- if .Values.redis.sentinelMaster }}
  CONCORD_REDIS_SENTINEL_MASTER: {{ .Values.redis.sentinelMaster | quote }}
  {{- end }}
  {{- with .Values.redis.sentinelAddrs }}
  CONCORD_REDIS_SENTINEL_ADDRS: {{ join "," . | quote }}
  {{- end }}
  CONCORD_REDIS_DB: {{ .Values.redis.db | quote }}
  CONCORD_REDIS_TLS: {{ .Values.redis.tls.enabled | quote }}
  {{- if .Values.redis.tls.insecureSkipVerify }}
  CONCORD_REDIS_TLS_INSECURE: "true"
  {{- end }}
  {{- if .Values.redis.tls.serverName }}
  CONCORD_REDIS_TLS_SERVERNAME: {{ .Values.redis.tls.serverName | quote }}
  {{- end }}
  CONCORD_REDIS_DIAL_TIMEOUT: {{ .Values.redis.timeouts.dial | quote }}
  CONCORD_REDIS_READ_TIMEOUT: {{ .Values.redis.timeouts.read | quote }}
  CONCORD_REDIS_WRITE_TIMEOUT: {{ .Values.redis.timeouts.write | quote }}
  CONCORD_LIMITER_FALLBACK_RATIO: {{ .Values.redis.fallbackRatio | quote }}
  {{- end }}
  {{- if .Values.kafka.brokers }}
  # Durable event pipe to Kafka. server fails fast at startup if brokers
  # are unreachable, so make sure the Pod can reach them before rollout.
  CONCORD_KAFKA_BROKERS: {{ join "," .Values.kafka.brokers | quote }}
  CONCORD_KAFKA_TOPIC: {{ .Values.kafka.topic | quote }}
  CONCORD_KAFKA_CLIENT_ID: {{ .Values.kafka.clientId | quote }}
  {{- if .Values.kafka.compression }}
  CONCORD_KAFKA_COMPRESSION: {{ .Values.kafka.compression | quote }}
  {{- end }}
  CONCORD_KAFKA_WRITE_TIMEOUT: {{ .Values.kafka.writeTimeout | quote }}
  CONCORD_KAFKA_BATCH_TIMEOUT: {{ .Values.kafka.batchTimeout | quote }}
  CONCORD_KAFKA_TLS: {{ .Values.kafka.tls.enabled | quote }}
  {{- if .Values.kafka.tls.insecureSkipVerify }}
  CONCORD_KAFKA_TLS_INSECURE: "true"
  {{- end }}
  {{- if .Values.kafka.tls.serverName }}
  CONCORD_KAFKA_TLS_SERVERNAME: {{ .Values.kafka.tls.serverName | quote }}
  {{- end }}
  {{- if .Values.kafka.sasl.mechanism }}
  CONCORD_KAFKA_SASL_MECHANISM: {{ .Values.kafka.sasl.mechanism | quote }}
  {{- end }}
  {{- end }}
  CONCORD_OUTBOX_POLL_INTERVAL: {{ .Values.outbox.pollInterval | quote }}
  CONCORD_OUTBOX_BATCH_SIZE: {{ .Values.outbox.batchSize | quote }}
  CONCORD_OUTBOX_MAX_ATTEMPTS: {{ .Values.outbox.maxAttempts | quote }}
  {{- if .Values.smtp.host }}
  CONCORD_SMTP_HOST: {{ .Values.smtp.host | quote }}
  CONCORD_SMTP_PORT: {{ .Values.smtp.port | quote }}
  CONCORD_SMTP_FROM: {{ .Values.smtp.from | quote }}
  CONCORD_SMTP_TLS: {{ .Values.smtp.tls | quote }}
  {{- end }}
  {{- if .Values.otel.endpoint }}
  # Distributed tracing — env names mirror the OTEL_* spec so generic
  # collector setups (vendor docs, kubectl debug recipes) work as-is.
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.otel.protocol | quote }}
  OTEL_EXPORTER_OTLP_INSECURE: {{ .Values.otel.insecure | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.otel.sampleRatio | quote }}
  {{- if .Values.otel.serviceName }}
  OTEL_SERVICE_NAME: {{ .Values.otel.serviceName | quote }}
  {{- end }}
  {{- end }}
