# Concord Prometheus alerting rules.
#
# Drop into a Prometheus rule_files target. Every alert carries:
#   - severity: page (wake someone up) | warn (file a ticket)
#   - runbook: docs/runbook.md anchor that diagnoses + fixes it
#   - summary / description fields formatted for Alertmanager →
#     Slack/Opsgenie/PagerDuty templates.
#
# The "for:" durations are chosen to filter out one-off blips while
# still catching real outages quickly. Tune to your traffic shape.

groups:
  - name: concord-availability
    interval: 30s
    rules:
      - alert: ConcordHighHTTPErrorRate
        expr: |
          sum(rate(concord_http_requests_total{status=~"5.."}[5m]))
            /
          clamp_min(sum(rate(concord_http_requests_total[5m])), 1)
            > 0.01
        for: 5m
        labels:
          severity: page
          service: concord-server
        annotations:
          summary: "Concord 5xx error rate >1% for 5m"
          description: "Current rate: {{ $value | humanizePercentage }}. Investigate via docs/runbook.md §8 (metrics)."
          runbook: "docs/runbook.md"

      - alert: ConcordHTTPLatencyP99High
        expr: |
          histogram_quantile(0.99,
            sum(rate(concord_http_request_duration_seconds_bucket[5m])) by (le, pattern)
          ) > 2
        for: 10m
        labels:
          severity: warn
          service: concord-server
        annotations:
          summary: "p99 latency >2s on {{ $labels.pattern }} for 10m"
          description: "p99 is {{ $value }}s. Common causes: DB pool saturation, slow downstream call."

      - alert: ConcordReadinessProbeFailing
        # concord-server's readyz lights up `up{job="concord-server"}` as 0
        # via blackbox-exporter; if you scrape /readyz directly, replace
        # with: probe_success{job="concord-readyz"} == 0
        expr: up{job=~"concord-(server|worker)"} == 0
        for: 2m
        labels:
          severity: page
          service: "{{ $labels.job }}"
        annotations:
          summary: "{{ $labels.job }} pod is not ready for 2m"
          description: "Scrape target {{ $labels.instance }} is down. Check k8s events + pod logs."

  - name: concord-outbox
    interval: 30s
    rules:
      - alert: ConcordOutboxLagging
        expr: max(concord_outbox_lag_seconds) > 60
        for: 5m
        labels:
          severity: page
          service: concord-server
        annotations:
          summary: "Outbox dispatch lag >60s for 5m"
          description: "Oldest unpublished row is {{ $value }}s old. Runbook §1."
          runbook: "docs/runbook.md#1-the-dispatcher-is-falling-behind"

      - alert: ConcordOutboxNotPublishing
        # No publishes for 5 minutes while pending lag exists =
        # dispatcher is wedged or Kafka is fully unreachable.
        expr: |
          rate(concord_outbox_published_total[5m]) == 0
          and
          concord_outbox_lag_seconds > 0
        for: 5m
        labels:
          severity: page
          service: concord-server
        annotations:
          summary: "Outbox dispatcher is not publishing anything"
          description: "Pending rows exist ({{ $value }}s lag) but publish rate is zero. Check Kafka reachability + dispatcher logs."
          runbook: "docs/runbook.md#1-the-dispatcher-is-falling-behind"

      - alert: ConcordOutboxDeadLetterAccumulating
        # The dead cohort should stay near-zero. A growing tail means a
        # persistent receiver-side bug.
        expr: sum(increase(concord_outbox_dead_total[1h])) > 10
        for: 15m
        labels:
          severity: warn
          service: concord-server
        annotations:
          summary: "Outbox dead-letter rows climbing — operator review needed"
          description: "{{ $value }} rows became dead in the last hour. Use /operator/v1/dlq/events to triage."
          runbook: "docs/runbook.md#1-the-dispatcher-is-falling-behind"

  - name: concord-worker
    interval: 30s
    rules:
      - alert: ConcordWorkerHighFailureRate
        expr: |
          sum(rate(concord_worker_attempts_total{outcome!="succeeded"}[5m]))
            /
          clamp_min(sum(rate(concord_worker_attempts_total[5m])), 1)
            > 0.20
        for: 10m
        labels:
          severity: warn
          service: concord-worker
        annotations:
          summary: ">20% of webhook delivery attempts are failing"
          description: "Likely candidates: one receiver is down (check breaker state), or your network is flaky."
          runbook: "docs/runbook.md#2-a-webhook-receiver-is-wedged"

      - alert: ConcordWorkerDeadLetterAccumulating
        expr: sum(increase(concord_worker_dead_total[1h])) > 10
        for: 15m
        labels:
          severity: warn
          service: concord-worker
        annotations:
          summary: "Webhook dead-letter rows climbing"
          description: "{{ $value }} deliveries hit max-attempts in the last hour. Use /operator/v1/dlq/deliveries."
          runbook: "docs/runbook.md#2-a-webhook-receiver-is-wedged"

      - alert: ConcordWorkerRetrierStalled
        # The retrier should tick at least once a second under default
        # config. A flat counter for 5 minutes is a stuck process.
        expr: rate(concord_worker_retrier_ticks_total[5m]) == 0
        for: 5m
        labels:
          severity: page
          service: concord-worker
        annotations:
          summary: "Worker retrier is not ticking"
          description: "rate(ticks[5m]) is zero. Process may be deadlocked; restart and check logs."

      - alert: ConcordCircuitBreakersThrashing
        # Sustained open/close oscillation indicates a marginal receiver
        # — neither healthy enough to admit, nor broken enough to settle
        # into 'open'. Worth investigating manually.
        expr: |
          sum(rate(concord_worker_breaker_state_changes_total{state="open"}[10m])) > 0.05
        for: 30m
        labels:
          severity: warn
          service: concord-worker
        annotations:
          summary: "Circuit breakers oscillating for 30m"
          description: "Rate of opens: {{ $value }}/s. A marginal receiver is causing the breaker to flap. Runbook §3."
          runbook: "docs/runbook.md#3-the-circuit-breaker-wont-stop-tripping"

  - name: concord-infra
    interval: 30s
    rules:
      - alert: ConcordDBPoolSaturated
        expr: |
          concord_db_pool_acquired_connections / clamp_min(concord_db_pool_max_connections, 1) > 0.9
        for: 5m
        labels:
          severity: warn
          service: concord-server
        annotations:
          summary: "DB pool >90% saturated for 5m"
          description: "{{ $value | humanizePercentage }} of pool in use. Scale the pool or the DB."

      - alert: ConcordLimiterPrimaryDown
        # Redis-backed limiter is failing more than the per-pod
        # fallback can compensate for. Auth surfaces lose their shared
        # ceiling — credential-stuffing rate climbs by replica count.
        expr: sum(rate(concord_limiter_primary_errors_total[5m])) > 10
        for: 5m
        labels:
          severity: warn
          service: concord-server
        annotations:
          summary: "Rate limiter Redis primary failing for 5m"
          description: "{{ $value }}/s primary errors. Fallback bucket carrying load. Restore Redis."

      - alert: ConcordIdempotencyDegraded
        expr: rate(concord_idempotency_redis_errors_total[5m]) > 1
        for: 5m
        labels:
          severity: warn
          service: concord-server
        annotations:
          summary: "Idempotency middleware degraded to pass-through"
          description: "Redis is intermittently failing — duplicate POSTs are possible during the outage. Runbook §5."
          runbook: "docs/runbook.md#5-idempotency-cache-is-stale-or-wedged"

      - alert: ConcordAuditPartitionRotatorFailing
        expr: increase(concord_audit_partition_rotator_errors_total[1h]) > 0
        for: 1h
        labels:
          severity: warn
          service: concord-server
        annotations:
          summary: "Audit partition rotator has had errors in the last hour"
          description: "Next-month partition may be missing. Runbook §4."
          runbook: "docs/runbook.md#4-audit-partition-rotator-is-failing"
