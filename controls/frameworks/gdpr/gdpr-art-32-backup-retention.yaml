apiVersion: concord.dev/v1
kind: Control

metadata:
  id: GDPR-ART-32-BACKUP-RETENTION
  name: backup-retention-configured
  title: RDS / EBS / RDS-Aurora backups retain for the documented period
  framework: gdpr
  category: Security of processing
  severity: high
  tags:
    - gdpr
    - backup
    - resilience
    - prowler
  owners:
    - team: platform

spec:
  description: |
    GDPR Article 32(1)(c) requires "the ability to restore the
    availability and access to personal data in a timely manner in the
    event of a physical or technical incident". Without a verified
    backup posture, that ability is wishful thinking.

  rationale: |
    The Ferrari 2023 breach showed a recovery posture that worked on
    paper but had no actively-tested backup; ransomware took 72 hours
    longer to recover than the published RTO. Prowler validates the
    cloud-side knobs: backup enabled, retention non-zero, encryption
    enabled on snapshots.

  evidence:
    - id: prowler
      source: prowler
      params:
        provider: aws
        compliance: gdpr_eu
        services:
          - backup
          - rds
          - ebs
      fixture: ./tests/fixtures/prowler-backup-pass.json

  policy:
    engine: rego
    package: concord.gdpr.prowler
    file: ./policies/prowler.rego

  remediation:
    runbook: docs/remediation/gdpr-art-32-backup-retention.md
    auto_fix: false
    estimated_effort: 1h

  mappings:
    gdpr:
      - "Article 32(1)(c)"
    iso27001:
      - A.12.3.1
      - A.17.1.2
    nist_800_53:
      - CP-9
      - CP-10
    soc2:
      - A1.2

  status: stable
  blocking: true
