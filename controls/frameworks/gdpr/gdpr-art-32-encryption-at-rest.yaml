apiVersion: concord.dev/v1
kind: Control

metadata:
  id: GDPR-ART-32-ENCRYPTION-AT-REST
  name: encryption-at-rest
  title: All data stores backing personal data are encrypted at rest
  framework: gdpr
  category: Security of processing
  severity: critical
  tags:
    - gdpr
    - encryption
    - prowler
  owners:
    - team: security

spec:
  description: |
    GDPR Article 32(1)(a) requires "the pseudonymisation and encryption
    of personal data". This control verifies that every customer-managed
    data store that could hold personal data (RDS, EBS, S3, DynamoDB)
    is encrypted at rest with a managed or customer-managed KMS key.

  rationale: |
    Encryption at rest is the baseline technical measure regulators
    expect under Art. 32. It protects against media-theft and
    accidental disclosure when storage devices are decommissioned or
    snapshots are accidentally shared.

  evidence:
    - id: prowler
      source: prowler
      params:
        provider: aws
        compliance: gdpr_eu
        services:
          - rds
          - ebs
          - s3
          - dynamodb
          - efs
      fixture: ./tests/fixtures/prowler-encryption-pass.json

  policy:
    engine: rego
    package: concord.gdpr.prowler
    file: ./policies/prowler.rego

  remediation:
    runbook: docs/remediation/gdpr-art-32-encryption-at-rest.md
    auto_fix: false
    estimated_effort: 1h

  mappings:
    gdpr:
      - "Article 32(1)(a)"
    iso27001:
      - A.10.1.1
    nist_800_53:
      - SC-28
    soc2:
      - CC6.7

  status: stable
  blocking: true
