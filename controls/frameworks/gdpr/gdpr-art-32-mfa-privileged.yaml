apiVersion: concord.dev/v1
kind: Control

metadata:
  id: GDPR-ART-32-MFA-PRIVILEGED
  name: mfa-on-privileged-accounts
  title: Every privileged identity has multi-factor authentication enforced
  framework: gdpr
  category: Security of processing
  severity: critical
  tags:
    - gdpr
    - mfa
    - identity
    - prowler
  owners:
    - team: security

spec:
  description: |
    GDPR Article 32(1)(b) — "ensure the ongoing confidentiality,
    integrity, availability and resilience of processing systems" —
    requires strong authentication for any identity with the power to
    expose or modify personal data. MFA is the bar regulators expect.

  rationale: |
    The 2017 Equifax breach (143M records, $700M settlement) traced
    back to an unrotated certificate and weak admin authentication.
    The DPA settlement explicitly cited absent MFA on privileged
    accounts as an aggravating factor.

  evidence:
    - id: prowler
      source: prowler
      params:
        provider: aws
        compliance: gdpr_eu
        services:
          - iam
      fixture: ./tests/fixtures/prowler-iam-mfa-pass.json

  policy:
    engine: rego
    package: concord.gdpr.prowler
    file: ./policies/prowler.rego

  remediation:
    runbook: docs/remediation/gdpr-art-32-mfa-privileged.md
    auto_fix: false
    estimated_effort: 1h

  mappings:
    gdpr:
      - "Article 32(1)(b)"
    iso27001:
      - A.9.4.2
      - A.9.4.3
    nist_800_53:
      - IA-2
      - IA-2(1)
    soc2:
      - CC6.1
    cis_aws_v2:
      - "1.5"
      - "1.10"

  status: stable
  blocking: true
