apiVersion: concord.dev/v1
kind: Control

metadata:
  id: GDPR-ART-32-KMS-KEY-ROTATION
  name: kms-key-rotation
  title: Customer-managed KMS keys rotate at least annually
  framework: gdpr
  category: Security of processing
  severity: high
  tags:
    - gdpr
    - encryption
    - kms
    - prowler
  owners:
    - team: security

spec:
  description: |
    GDPR Article 32(1)(d) requires "regular testing, assessing and
    evaluating the effectiveness of technical measures". Key rotation
    is the operational test of the encryption guarantee — a key that
    never rotates degrades its protective value over time as exposure
    risk accumulates.

  rationale: |
    NIST SP 800-57 recommends a cryptoperiod of at most one year for
    symmetric data-encryption keys. AWS KMS, GCP KMS, and Azure Key
    Vault all support automatic annual rotation; Prowler verifies the
    setting is enabled for every customer-managed key.

  evidence:
    - id: prowler
      source: prowler
      params:
        provider: aws
        compliance: gdpr_eu
        services:
          - kms
      fixture: ./tests/fixtures/prowler-kms-rotation-pass.json

  policy:
    engine: rego
    package: concord.gdpr.prowler
    file: ./policies/prowler.rego

  remediation:
    runbook: docs/remediation/gdpr-art-32-kms-key-rotation.md
    auto_fix: true
    estimated_effort: 5m

  mappings:
    gdpr:
      - "Article 32(1)(d)"
    iso27001:
      - A.10.1.2
    nist_800_53:
      - SC-12
      - SC-12(3)
    soc2:
      - CC6.7

  status: stable
  blocking: true
