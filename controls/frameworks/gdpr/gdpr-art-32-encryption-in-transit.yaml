apiVersion: concord.dev/v1
kind: Control

metadata:
  id: GDPR-ART-32-ENCRYPTION-IN-TRANSIT
  name: encryption-in-transit
  title: TLS 1.2+ enforced on every public-facing endpoint
  framework: gdpr
  category: Security of processing
  severity: critical
  tags:
    - gdpr
    - tls
    - prowler
  owners:
    - team: security

spec:
  description: |
    GDPR Article 32(1)(a) extends "pseudonymisation and encryption" to
    data in transit. This control verifies that ELBs, ALBs, CloudFront
    distributions, and API Gateway endpoints enforce TLS 1.2 or higher
    and never serve cleartext HTTP for personal data.

  rationale: |
    Cleartext HTTP exposes personal data to passive network
    eavesdropping — a high-likelihood threat on shared / public
    networks. TLS < 1.2 has known cryptographic weaknesses
    (BEAST, POODLE) that downgrade the encryption guarantee.

  evidence:
    - id: prowler
      source: prowler
      params:
        provider: aws
        compliance: gdpr_eu
        services:
          - elbv2
          - elb
          - cloudfront
          - apigateway
          - apigatewayv2
      fixture: ./tests/fixtures/prowler-tls-pass.json

  policy:
    engine: rego
    package: concord.gdpr.prowler
    file: ./policies/prowler.rego

  remediation:
    runbook: docs/remediation/gdpr-art-32-encryption-in-transit.md
    auto_fix: false
    estimated_effort: 30m

  mappings:
    gdpr:
      - "Article 32(1)(a)"
    iso27001:
      - A.13.1.1
      - A.14.1.2
    nist_800_53:
      - SC-8
      - SC-13
    soc2:
      - CC6.7
    pci_dss:
      - "4.1"
      - "4.2"

  status: stable
  blocking: true
