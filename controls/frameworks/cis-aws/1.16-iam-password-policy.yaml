apiVersion: concord.dev/v1
kind: Control

metadata:
  id: CIS-AWS-1.16
  name: iam-password-policy
  title: IAM account password policy meets CIS minimums
  framework: cis-aws
  category: IAM
  severity: high
  tags:
    - aws
    - iam
    - password-policy
  owners:
    - team: platform

spec:
  description: |
    CIS AWS Foundations 1.16 requires the account's IAM password policy to
    enforce length, complexity, rotation, and reuse-prevention minimums.
    A weak or unset password policy lets human users register guessable
    credentials that ride alongside production access.

  rationale: |
    Concord pulls the live policy via iam:GetAccountPasswordPolicy. A
    missing policy (NoSuchEntity) is a hard fail. Configured policies are
    measured against the CIS thresholds; each unmet threshold becomes a
    distinct deny message so the user fixes the exact field that's wrong.

  evidence:
    - id: password_policy
      source: aws
      type: iam_password_policy
      fixture: ./tests/fixtures/iam-password-policy-pass.json

  policy:
    engine: rego
    package: concord.cis_aws.iam_password_policy
    file: ./policies/iam_password_policy.rego

  remediation:
    runbook: docs/remediation/cis-aws-1.16.md
    auto_fix: false
    estimated_effort: 15m

  mappings:
    cis_aws_v2:
      - "1.16"
    nist_csf:
      - PR.AC-1
    iso27001:
      - A.5.17
    soc2:
      - CC6.1

  status: stable
  blocking: true
