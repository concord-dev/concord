apiVersion: concord.dev/v1
kind: Control

metadata:
  id: CIS-AWS-2.1.1
  name: s3-default-encryption
  title: All S3 buckets have server-side encryption enabled
  framework: cis-aws
  category: Storage
  severity: high
  tags:
    - aws
    - s3
    - encryption-at-rest
  owners:
    - team: platform

spec:
  description: |
    CIS AWS Foundations Benchmark 2.1.1 requires server-side encryption
    be enabled on every S3 bucket. Concord lists every bucket via the
    ListBuckets API, calls GetBucketEncryption on each, and fails the
    control if any bucket returns no encryption configuration. Each
    rule's algorithm is also surfaced: AES256 raises a warning since
    KMS provides stronger key management.

  rationale: |
    Without encryption-at-rest a single misconfigured bucket policy
    or compromised AWS credential exposes plaintext data. Server-side
    encryption is free, transparent to applications, and effectively
    mandatory under SOC 2 CC6.7, ISO 27001 A.5.33, and most data
    protection regimes.

  evidence:
    - id: s3_buckets
      source: aws
      type: s3_bucket_encryption
      fixture: ./tests/fixtures/s3-pass.json
      params:
        region: ${env.AWS_REGION}

  policy:
    engine: rego
    package: concord.cis_aws.s3_encryption
    file: ./policies/s3_encryption.rego

  remediation:
    runbook: docs/remediation/cis-aws-2.1.1.md
    auto_fix: false
    estimated_effort: 15m

  mappings:
    cis_aws_v2:
      - "2.1.1"
    nist_csf:
      - PR.DS-1
    iso27001:
      - A.5.33
    soc2:
      - CC6.7

  status: stable
  blocking: true
