apiVersion: concord.dev/v1
kind: Control

metadata:
  id: CIS-AWS-1.10
  name: console-users-have-mfa
  title: Every IAM user with a console password has MFA enabled
  framework: cis-aws
  category: IAM
  severity: critical
  tags:
    - aws
    - iam
    - mfa
  owners:
    - team: platform

spec:
  description: |
    CIS AWS Foundations 1.10 requires that every IAM user who can log in
    to the AWS Console (i.e. has a console password set) also has at
    least one MFA device enabled. Password-only access to the console
    is one of the highest-impact attack paths in AWS — a leaked password
    becomes account takeover.

  rationale: |
    Concord parses the IAM credential report. For every user with
    password_enabled = true and mfa_active = false, an explicit deny
    fires. The root account is excluded because CIS-AWS-1.5 already
    covers root MFA separately with stronger remediation guidance.

  evidence:
    - id: credentials
      source: aws
      type: iam_credential_report
      fixture: ./tests/fixtures/credentials-pass.json

  policy:
    engine: rego
    package: concord.cis_aws.console_mfa
    file: ./policies/console_mfa.rego

  remediation:
    runbook: docs/remediation/cis-aws-1.10.md
    auto_fix: false
    estimated_effort: 1h

  mappings:
    cis_aws_v2:
      - "1.10"
    nist_csf:
      - PR.AC-7
    iso27001:
      - A.5.17
    soc2:
      - CC6.1

  status: stable
  blocking: true
