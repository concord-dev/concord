apiVersion: concord.dev/v1
kind: Control

metadata:
  id: CIS-AWS-1.5
  name: root-account-mfa
  title: Root account has MFA enabled
  framework: cis-aws
  category: IAM
  severity: critical
  tags:
    - aws
    - iam
    - root-account
    - mfa
  owners:
    - team: platform

spec:
  description: |
    CIS AWS Foundations 1.5 requires the root account to have MFA enabled.
    The root user holds full account privileges; without MFA, a single
    credential leak compromises the entire AWS account.

  rationale: |
    Concord checks the IAM account summary for AccountMFAEnabled. A
    value of 1 means root MFA is on. We do not require hardware MFA
    here (covered separately by CIS-AWS-1.6); any MFA factor satisfies
    this baseline check.

  evidence:
    - id: iam_summary
      source: aws
      type: iam_account_summary
      fixture: ./tests/fixtures/iam-pass.json

  policy:
    engine: rego
    package: concord.cis_aws.root_mfa
    file: ./policies/root_mfa.rego

  remediation:
    runbook: docs/remediation/cis-aws-1.5.md
    auto_fix: false
    estimated_effort: 15m

  mappings:
    cis_aws_v2:
      - "1.5"
    nist_csf:
      - PR.AC-7
    iso27001:
      - A.5.17
    soc2:
      - CC6.1

  status: stable
  blocking: true
