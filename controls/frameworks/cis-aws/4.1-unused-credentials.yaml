apiVersion: concord.dev/v1
kind: Control

metadata:
  id: CIS-AWS-4.1
  name: unused-credentials
  title: IAM credentials unused for 90+ days are disabled
  framework: cis-aws
  category: IAM
  severity: high
  tags:
    - aws
    - iam
    - credential-hygiene
  owners:
    - team: platform

spec:
  description: |
    CIS AWS Foundations 4.1 requires that IAM credentials (console
    passwords and access keys) which have been unused for 90 days or
    longer be deactivated. Dormant credentials are a common attacker
    foothold: they exist long enough to be leaked through Git history,
    backups, or developer machines, but nobody notices they're still
    valid because no legitimate workflow exercises them.

  rationale: |
    Concord parses the IAM credential report (CSV) and flags any user
    whose password or access key has not been used in N days (default
    90). Tune via concord.yaml:

      spec:
        controls:
          params:
            CIS-AWS-4.1:
              max_unused_days: 60   # tighten for high-trust orgs

  evidence:
    - id: credentials
      source: aws
      type: iam_credential_report
      fixture: ./tests/fixtures/credentials-pass.json

  policy:
    engine: rego
    package: concord.cis_aws.unused_credentials
    file: ./policies/unused_credentials.rego

  remediation:
    runbook: docs/remediation/cis-aws-4.1.md
    auto_fix: false
    estimated_effort: 1h

  mappings:
    cis_aws_v2:
      - "4.1"
    nist_csf:
      - PR.AC-1
      - PR.AC-7
    iso27001:
      - A.5.16
      - A.5.18
    soc2:
      - CC6.2
      - CC6.3

  status: stable
  blocking: true
