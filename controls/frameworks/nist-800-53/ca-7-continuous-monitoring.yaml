apiVersion: concord.dev/v1
kind: Control

metadata:
  id: NIST-800-53-CA-7
  name: continuous-monitoring
  title: A continuous monitoring strategy is documented, current, and owned
  framework: nist-800-53
  category: Assessment, Authorization, and Monitoring
  severity: high
  tags:
    - continuous-monitoring
    - documentation
  owners:
    - team: security

spec:
  description: |
    NIST 800-53 Rev 5 CA-7 requires the organization to develop and
    document a continuous monitoring strategy that includes metrics to
    be monitored, frequency of monitoring, and personnel responsible.

  rationale: |
    Reuses the SOC2-CC4.1 evidence + Rego. The "documented monitoring
    strategy with alerts, owners, and review cadence" requirement maps
    1:1 to CA-7's strategy-documentation requirement.

  evidence:
    - id: monitoring_strategy
      source: github
      type: file_glob
      fixture: ../soc2/tests/fixtures/cc4.1-monitoring-pass.json
      params:
        repo: ${env.CONCORD_REPO}

  policy:
    engine: rego
    package: concord.soc2.cc4_1
    file: ../soc2/policies/cc4_1.rego

  mappings:
    nist_800_53:
      - "CA-7"
      - "CA-7(4)"
    soc2:
      - "CC4.1"
    iso27001:
      - "A.5.36"

  status: stable
  blocking: true
