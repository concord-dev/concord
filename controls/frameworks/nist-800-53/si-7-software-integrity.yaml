apiVersion: concord.dev/v1
kind: Control

metadata:
  id: NIST-800-53-SI-7
  name: software-firmware-integrity
  title: Production code passes through protected branches with review
  framework: nist-800-53
  category: System and Information Integrity
  severity: high
  tags:
    - change-management
    - github
    - branch-protection
  owners:
    - team: platform

spec:
  description: |
    NIST 800-53 Rev 5 SI-7 requires the organization to employ integrity
    verification tools to detect unauthorized changes to software and
    firmware. In a modern Git-driven SDLC, the integrity gate is the
    protected branch — every production change must traverse a reviewed
    pull request.

  rationale: |
    Reuses the SOC2-CC8.1 evidence + Rego. Protected default branch
    with mandatory reviews, no force pushes, and admin enforcement
    satisfies SI-7(1) "integrity checks on transition to production".

  evidence:
    - id: branch_protection
      source: github
      type: branch_protection
      fixture: ../soc2/tests/fixtures/cc8.1-pass.json
      params:
        repo: ${env.CONCORD_REPO}

  policy:
    engine: rego
    package: concord.soc2.cc8_1
    file: ../soc2/policies/cc8_1.rego

  mappings:
    nist_800_53:
      - "SI-7"
      - "SI-7(1)"
      - "CM-3"
    soc2:
      - "CC8.1"
    iso27001:
      - "A.8.32"

  status: stable
  blocking: true
