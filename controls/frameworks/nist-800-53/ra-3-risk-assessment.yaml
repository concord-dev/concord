apiVersion: concord.dev/v1
kind: Control

metadata:
  id: NIST-800-53-RA-3
  name: risk-assessment
  title: A documented risk-assessment process is current with named owner
  framework: nist-800-53
  category: Risk Assessment
  severity: high
  tags:
    - risk-assessment
    - documentation
  owners:
    - team: security

spec:
  description: |
    NIST 800-53 Rev 5 RA-3 requires the organization to conduct a risk
    assessment, document it, review it on a defined cadence, and update
    it as needed. The process itself — methodology, scope, owner — is
    auditable evidence in its own right.

  rationale: |
    Reuses the SOC2-CC3.1 evidence + Rego. The "risk-assessment
    methodology documented with owner, cadence, and last review"
    invariant satisfies RA-3(a-d).

  evidence:
    - id: risk_process
      source: github
      type: file_glob
      fixture: ../soc2/tests/fixtures/cc3.1-process-pass.json
      params:
        repo: ${env.CONCORD_REPO}

  policy:
    engine: rego
    package: concord.soc2.cc3_1
    file: ../soc2/policies/cc3_1.rego

  mappings:
    nist_800_53:
      - "RA-3"
    soc2:
      - "CC3.1"
    iso27001:
      - "A.5.5"
    iso42001:
      - "6.1"

  status: stable
  blocking: true
