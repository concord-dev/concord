apiVersion: concord.dev/v1
kind: Control

metadata:
  id: NIST-800-53-AC-2
  name: account-management
  title: User accounts are reviewed on a documented cadence
  framework: nist-800-53
  category: Access Control
  severity: high
  tags:
    - access-control
    - account-management
  owners:
    - team: security

spec:
  description: |
    NIST 800-53 Rev 5 AC-2 requires the organization to identify and
    select account types, manage account lifecycles, and review accounts
    for compliance with the documented cadence. Concord verifies the
    review-cadence component by reading the access-review log written
    by the access-review ceremony.

  rationale: |
    Reuses the SOC2-CC6.2 evidence + Rego. "Periodic access reviews are
    documented and current" is operationally identical across SOC 2
    CC6.2 and NIST 800-53 AC-2(j). One ceremony, one piece of evidence,
    two frameworks satisfied — that's the crosswalk dividend.

  evidence:
    - id: access_reviews
      source: github
      type: file_glob
      fixture: ../soc2/tests/fixtures/cc6.2-reviews-pass.json
      params:
        repo: ${env.CONCORD_REPO}

  policy:
    engine: rego
    package: concord.soc2.cc6_2
    file: ../soc2/policies/cc6_2.rego

  mappings:
    nist_800_53:
      - "AC-2"
      - "AC-2(j)"
    soc2:
      - "CC6.2"
    iso27001:
      - "A.5.18"

  status: stable
  blocking: true
