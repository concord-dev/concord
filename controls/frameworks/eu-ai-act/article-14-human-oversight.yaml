apiVersion: concord.dev/v1
kind: Control

metadata:
  id: EU-AIAct-Article14
  name: human-oversight-runbook
  title: Every high-risk AI system has a documented human-oversight runbook
  framework: eu-ai-act
  category: Provider obligations
  severity: high
  tags:
    - ai
    - eu-ai-act
    - human-oversight
    - runbook
  owners:
    - team: ai-governance

spec:
  description: |
    EU AI Act Article 14 requires high-risk AI systems to be designed
    so they can be effectively overseen by natural persons during the
    period the system is in use. Concord enforces a documented human
    oversight runbook at docs/ai/oversight/<model>.md for every
    high-risk production model. The runbook must declare the
    overseer roles, capability/limitation summary, and kill-switch
    procedure.

  rationale: |
    Most failures of high-risk AI come not from the model itself but
    from operator confusion about its capabilities and from missing
    intervention procedures. A versioned, named runbook is the
    minimum-viable artifact an auditor will accept as evidence that
    human oversight has been operationalized rather than merely
    documented as a policy aspiration.

  evidence:
    - id: model_registry
      source: mlflow
      type: model_registry
      fixture: ./tests/fixtures/models-with-high-risk.json
      params:
        tracking_uri: ${env.MLFLOW_TRACKING_URI}

    - id: oversight_docs
      source: github
      type: file_glob
      fixture: ./tests/fixtures/oversight-pass.json
      params:
        repo: ${env.CONCORD_REPO}
        paths:
          - "docs/ai/oversight/*.md"
        parse: frontmatter

  policy:
    engine: rego
    package: concord.eu_ai_act.article_14
    file: ./policies/article_14.rego

  remediation:
    runbook: docs/remediation/eu-ai-act-article-14.md
    auto_fix: false
    estimated_effort: 6h

  mappings:
    eu_ai_act:
      - "Article-14"
    iso42001:
      - "8.5"
    nist_ai_rmf:
      - "MANAGE-1.2"
      - "MANAGE-2.3"

  status: stable
  blocking: true
